name: Release Binaries

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  binaries:
    name: Build CLI Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            asset: commons-cli-linux-amd64
          - target: aarch64-unknown-linux-gnu
            asset: commons-cli-linux-arm64
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build
        env:
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --locked --bin commons-cli --target ${{ matrix.target }}
      - run: cp target/${{ matrix.target }}/release/commons-cli ${{ matrix.asset }}
      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
