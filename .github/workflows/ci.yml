name: CI

on:
  push:
    branches: ["main"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo test --locked
      - run: cargo clippy --locked --all-targets -- -D warnings

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-audit --locked
      - run: cargo audit

  terraform:
    name: Terraform Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
      - run: terraform fmt -check -recursive infra

  ci-binaries:
    name: CI CLI Binary
    runs-on: ubuntu-latest
    needs: [rust, audit, terraform]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            asset: commons-cli-linux-amd64
          - target: aarch64-unknown-linux-gnu
            asset: commons-cli-linux-arm64
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build CLI
        env:
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --locked --bin commons-cli --target ${{ matrix.target }}
      - name: Smoke-test CLI
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: target/${{ matrix.target }}/release/commons-cli --help >/dev/null
      - run: cp target/${{ matrix.target }}/release/commons-cli ${{ matrix.asset }}
      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  ci-release:
    name: Publish CI Binaries
    runs-on: ubuntu-latest
    needs: ci-binaries
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v6
        with:
          path: dist
      - name: Update rolling CI release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag -f ci-latest "$GITHUB_SHA"
          git push origin refs/tags/ci-latest --force
          if ! gh release view ci-latest >/dev/null 2>&1; then
            gh release create ci-latest \
              --title "Latest CI build" \
              --notes "Rolling CLI binaries from the latest successful main-branch CI run." \
              --prerelease
          fi
          gh release upload ci-latest dist/*/* --clobber

  sonar:
    name: Sonar
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Skip when Sonar token is absent
        if: ${{ env.SONAR_TOKEN == '' }}
        run: echo "SONAR_TOKEN is not configured; skipping Sonar scan."
      - uses: actions/checkout@v6
        if: ${{ env.SONAR_TOKEN != '' }}
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        if: ${{ env.SONAR_TOKEN != '' }}
      - uses: Swatinem/rust-cache@v2
        if: ${{ env.SONAR_TOKEN != '' }}
      - run: cargo install cargo-llvm-cov
        if: ${{ env.SONAR_TOKEN != '' }}
      - run: cargo llvm-cov --all-features --workspace --lcov --output-path coverage/lcov.info
        if: ${{ env.SONAR_TOKEN != '' }}
      - uses: SonarSource/sonarqube-scan-action@v6
        if: ${{ env.SONAR_TOKEN != '' }}

  integration:
    name: Live Lambda Integration
    runs-on: ubuntu-latest
    env:
      LIVE_LAMBDA_URL: ${{ secrets.LIVE_LAMBDA_URL }}
      TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
    if: ${{ github.event_name != 'pull_request' }}
    steps:
      - name: Skip when live Lambda URL is absent
        if: ${{ env.LIVE_LAMBDA_URL == '' }}
        run: echo "LIVE_LAMBDA_URL is not configured; skipping live integration test."
      - uses: actions/checkout@v6
        if: ${{ env.LIVE_LAMBDA_URL != '' }}
      - name: Call live Lambda parser endpoint
        if: ${{ env.LIVE_LAMBDA_URL != '' }}
        run: |
          curl -fsS "${LIVE_LAMBDA_URL%/}/__test?q=flac%20Minsk%20c%20music" \
            -H "content-type: application/json" \
            -H "x-telegram-bot-api-secret-token: $TELEGRAM_WEBHOOK_SECRET" \
            | jq -e '.ok == true and (.intent | contains("FileSearch"))'
